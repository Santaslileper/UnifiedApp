<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width,initial-scale=1"><title>Temporal Flux</title><style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;position:relative}canvas{position:absolute;top:0;left:0;width:100%;height:100%}.overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:60px}.top{display:flex;justify-content:space-between}.life{background:rgba(0,0,0,.5);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px 30px}.life span{display:block}.label{font-size:.8rem;color:#aaa;text-transform:uppercase;letter-spacing:3px}.value{font-family:'Orbitron';font-size:3rem;font-weight:900;background:linear-gradient(135deg,#ff0080,#ff8c00,#40e0d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.clock{text-align:right}.time{font-family:'Orbitron';font-size:4rem;font-weight:900;color:#fff;letter-spacing:6px;text-shadow:0 0 20px #fff}.date{font-size:1rem;color:#bbb;margin-top:5px}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.quote{background:rgba(0,0,0,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:25px;padding:40px 60px;max-width:900px}.quote h2{font-size:2rem;color:#fff;margin-bottom:20px}.quote p{color:#ff8c00;font-style:italic}.bottom{display:flex;justify-content:space-between}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.box{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:15px;text-align:center}.box b{display:block;font-family:'Orbitron';font-size:1.5rem;background:linear-gradient(135deg,#40e0d0,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.warn{font-family:'Orbitron';color:#ff0080;letter-spacing:3px}</style></head><body><canvas id="c"></canvas><div class="overlay"><div class="top"><div class="life"><span class="label">Days Lived</span><span class="value"id="days">—</span></div><div class="clock"><div class="time"id="t"></div><div class="date"id="d"></div></div></div><div class="center"><div class="quote"><h2 id="q">Time is the coin of your life.</h2><p id="a">— Carl Sandburg</p></div></div><div class="bottom"><div class="stats"><div class="box"><b id="h"></b>Hours</div><div class="box"><b id="dy"></b>Day</div><div class="box"><b id="wk"></b>Week</div></div><div class="warn">⚠ TIME IS NON-RENEWABLE ⚠</div></div></div><script>const c=document.getElementById("c"),x=c.getContext("2d");let w=c.width=innerWidth,h=c.height=innerHeight;addEventListener("resize",()=>{w=c.width=innerWidth;h=c.height=innerHeight});class P{constructor(){this.r()}r(){this.x=Math.random()*w;this.y=Math.random()*h;this.vx=(Math.random()-.5)*2;this.vy=(Math.random()-.5)*2;this.s=Math.random()*3+1;this.l=1;this.d=Math.random()*.005+.002;this.c=`hsl(${Math.random()*60+180},100%,60%)`}u(){this.x+=this.vx;this.y+=this.vy;this.l-=this.d;if(this.l<=0||this.x<0||this.x>w||this.y<0||this.y>h)this.r()}d(){x.globalAlpha=this.l;x.fillStyle=this.c;x.beginPath();x.arc(this.x,this.y,this.s,0,6.28);x.fill();x.globalAlpha=1}}const p=Array.from({length:120},()=>new P);function draw(){let g=x.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);g.addColorStop(0,"#0a0015");g.addColorStop(1,"#000");x.fillStyle=g;x.fillRect(0,0,w,h);p.forEach(e=>{e.u();e.d()});requestAnimationFrame(draw)}draw();const quotes=[["Time is the coin of your life.","Carl Sandburg"],["Lost time is never found again.","Benjamin Franklin"],["The trouble is, you think you have time.","Buddha"],["Your time is limited.","Steve Jobs"]];let qi=0;setInterval(()=>{qi=(qi+1)%quotes.length;document.getElementById("q").textContent=quotes[qi][0];document.getElementById("a").textContent="— "+quotes[qi][1]},25000);function stats(){let n=new Date(),h=n.getHours(),m=n.getMinutes().toString().padStart(2,"0"),s=n.getSeconds().toString().padStart(2,"0");document.getElementById("t").textContent=`${h}:${m}:${s}`;document.getElementById("d").textContent=n.toDateString();document.getElementById("h").textContent=h;let start=new Date(n.getFullYear(),0,0),day=Math.floor((n-start)/864e5);document.getElementById("dy").textContent=day;document.getElementById("wk").textContent=Math.ceil(day/7);let b=localStorage.getItem("wallpaper_birthdate");if(b){let diff=Math.floor((Date.now()-new Date(b))/864e5);document.getElementById("days").textContent=diff}}setInterval(stats,1000);stats();</script></body></html>
