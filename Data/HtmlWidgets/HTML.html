<html>

<head>
    <meta charset='utf-8' />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0f0f18;
            color: #e0e0ff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        .card {
            text-align: center
        }

        .city {
            font-size: 11px;
            color: #6688cc;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px
        }

        .temp {
            font-size: 46px;
            font-weight: 300;
            color: #fff;
            line-height: 1
        }

        .unit {
            font-size: 18px;
            vertical-align: super;
            color: #6688cc
        }

        .cond {
            font-size: 11px;
            color: #8899bb;
            margin-top: 6px
        }

        .icon {
            font-size: 34px;
            margin-bottom: 4px
        }
    </style>
</head>

<body>
    <div class='card'>
        <div class='icon'>&#9925;</div>
        <div class='city'>My Widget</div>
        <div class='temp'>72<span class='unit'>&#176;F</span></div>
        <div class='cond'>Click 'edit' to customise</div>
    </div>
</body>

</html>
